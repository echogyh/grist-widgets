<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宏量供能比</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
  min-height: 100vh;
}
.title {
  font-size: 15px;
  font-weight: 500;
  color: #1a1a18;
  text-align: center;
  margin-bottom: 4px;
  line-height: 1.4;
}
.subtitle {
  font-size: 12px;
  color: #888780;
  text-align: center;
  margin-bottom: 12px;
}
.chart-wrap {
  width: 100%;
  max-width: 300px;
}
.empty {
  font-size: 13px;
  color: #888780;
  margin-top: 40px;
}
@media (prefers-color-scheme: dark) {
  .title { color: #e8e6df; }
  .subtitle { color: #6e6d68; }
}
</style>
</head>
<body>

<div class="title" id="title">—</div>
<div class="subtitle" id="subtitle">—</div>
<div class="chart-wrap">
  <canvas id="chart"></canvas>
</div>
<div class="empty" id="empty" style="display:none">请选择一个配方</div>

<script>
let chart = null;

grist.ready({ 
  requiredAccess: 'read table',
  columns: [
    { name: 'formulaCN', type: 'Text' },
    { name: 'calorie_caculated', type: 'Numeric' },
    { name: 'protein_ratio', type: 'Numeric' },
    { name: 'carbo_ratio', type: 'Numeric' },
    { name: 'fat_ratio', type: 'Numeric' }
  ]
});

grist.onRecord(function(record, mappings) {
    console.log('record:', JSON.stringify(record));

  const mapped = grist.mapColumnNames(record, mappings);
  
  const name = mapped.formulaCN || record.formulaCN || '未命名配方';
  const calories = mapped.calorie_caculated ?? record.calorie_caculated;
  const protein = mapped.protein_ratio ?? record.protein_ratio ?? 0;
  const carbo = mapped.carbo_ratio ?? record.carbo_ratio ?? 0;
  const fat = mapped.fat_ratio ?? record.fat_ratio ?? 0;

  const total = protein + carbo + fat;
  if (total === 0) {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('title').textContent = '—';
    document.getElementById('subtitle').textContent = '—';
    if (chart) { chart.destroy(); chart = null; }
    return;
  }

  document.getElementById('empty').style.display = 'none';
  document.getElementById('title').textContent = name;
  document.getElementById('subtitle').textContent =
    calories != null
      ? '总热量 ' + Math.round(calories) + ' kcal / 份'
      : '总热量未录入';

  const labels = [
    '蛋白质 ' + protein + '%',
    '碳水化合物 ' + carbo + '%',
    '脂肪 ' + fat + '%'
  ];
  const data = [protein, carbo, fat];
  const colors = ['#5DCAA5', '#7F77DD', '#EF9F27'];

  if (chart) {
    chart.destroy();
    chart = null;
  } else {
    chart = new Chart(document.getElementById('chart'), {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{
          data: data,
          backgroundColor: colors,
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: 'bottom',
            labels: {
              font: { size: 12, family: 'system-ui' },
              padding: 16,
              boxWidth: 12,
              boxHeight: 12
            }
          },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                return ' ' + ctx.label;
              }
            }
          }
        }
      }
    });
  }
});
</script>
</body>
</html>
